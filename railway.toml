[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/api/v1/artists/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[[deploy.envVars]]
name = "DJANGO_SETTINGS_MODULE"
value = "config.settings_railway"

[[deploy.envVars]]
name = "PYTHONPATH"
value = "backend"
