services:
  db:
    image: postgres:15-alpine
    container_name: glamconnect_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: glamconnect
      POSTGRES_USER: glamconnect_user
      POSTGRES_PASSWORD: glamconnect_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glamconnect_user -d glamconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: glamconnect_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glamconnect_web
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-secret-key-change-in-production
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DATABASE_URL: postgresql://glamconnect_user:glamconnect_pass@db:5432/glamconnect
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      DB_HOST: db
      DB_PORT: "5432"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glamconnect_celery_worker
    entrypoint: ["sh", "-c"]
    command:
      - "while ! nc -z db 5432; do sleep 1; done && celery -A config worker --loglevel=info"
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-secret-key-change-in-production
      DATABASE_URL: postgresql://glamconnect_user:glamconnect_pass@db:5432/glamconnect
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
    depends_on:
      - db
      - redis
    restart: on-failure

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glamconnect_celery_beat
    entrypoint: ["sh", "-c"]
    command:
      - "while ! nc -z db 5432; do sleep 1; done && celery -A config beat --loglevel=info"
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-secret-key-change-in-production
      DATABASE_URL: postgresql://glamconnect_user:glamconnect_pass@db:5432/glamconnect
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      CLOUDINARY_CLOUD_NAME: ""
      CLOUDINARY_API_KEY: ""
      CLOUDINARY_API_SECRET: ""
    depends_on:
      - db
      - redis
    restart: on-failure

  nginx:
    image: nginx:alpine
    container_name: glamconnect_nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - web
    restart: on-failure

volumes:
  postgres_data:
  static_volume:
  media_volume:
