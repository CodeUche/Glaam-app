version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: glamconnect_db_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: glamconnect_redis_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: glamconnect_web_prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: glamconnect_celery_worker_prod
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    restart: always

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: glamconnect_celery_beat_prod
    command: celery -A config beat --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    restart: always

  channels:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: glamconnect_channels_prod
    command: daphne -b 0.0.0.0 -p 9000 config.asgi:application
    expose:
      - "9000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    container_name: glamconnect_nginx_prod
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - channels
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
